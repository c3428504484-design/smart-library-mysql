{% extends 'base.html' %}{% block heading %}读者中心{% endblock %}{% block content %}<div class="modal"><div class="card"><table><tr><th>读者</th><th>联系方式</th><th>状态</th><th></th></tr>{% for r in readers %}<tr><td><b>{{r.name}}</b></td><td>{{r.phone or '未填写'}}</td><td><span class="pill {{'warn' if r.status=='冻结'}}">{{r.status}}</span></td><td><form method="post" action="/readers/{{r.id}}/toggle"><button class="btn alt">切换状态</button></form></td></tr>{% endfor %}</table></div><div class="card"><h3>登记读者</h3><form method="post"><p><input name="name" placeholder="姓名" required></p><p><input name="phone" placeholder="联系电话"></p><p><select name="status"><option>正常</option><option>冻结</option></select></p><button class="btn">创建档案</button></form></div></div>{% endblock %}
