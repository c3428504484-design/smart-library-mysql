{% extends 'base.html' %}{% block heading %}借还流转{% endblock %}{% block content %}<div class="modal"><div class="card"><table><tr><th>读者</th><th>图书</th><th>应还日期</th><th>状态</th><th></th></tr>{% for x in loans %}<tr><td>{{x.reader.name}}</td><td><b>{{x.book.title}}</b></td><td>{{x.due_at}}</td><td><span class="pill {{'warn' if x.status=='借阅中' and x.due_at<today}}">{{'逾期' if x.status=='借阅中' and x.due_at<today else x.status}}</span></td><td>{% if x.status=='借阅中' %}<form method="post" action="/loans/{{x.id}}/return"><button class="btn alt">归还</button></form>{% endif %}</td></tr>{% endfor %}</table></div><div class="card"><h3>办理借阅</h3><form method="post"><p><select name="reader_id">{% for r in readers %}<option value="{{r.id}}">{{r.name}}</option>{% endfor %}</select></p><p><select name="book_id">{% for b in books %}<option value="{{b.id}}">{{b.title}}（{{b.available_qty}}）</option>{% endfor %}</select></p><button class="btn">确认借出</button></form></div></div>{% endblock %}
