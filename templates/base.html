<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}智阅馆{% endblock %}</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,"Microsoft YaHei",sans-serif;background:#f6f8fc;color:#182230}.side{position:fixed;width:240px;inset:0 auto 0 0;background:linear-gradient(170deg,#111c3b,#263b85);color:#dbe6ff;padding:28px 16px}.brand{font-size:22px;font-weight:800;color:#fff;margin:0 12px 34px}.brand span{color:#74d5ff}.side a{display:block;color:#c4d1f4;text-decoration:none;padding:12px;border-radius:10px;margin:6px 0}.side a:hover{background:#ffffff20;color:#fff}.main{margin-left:240px;padding:34px 48px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.eyebrow{color:#637083;font-size:13px}.card{background:#fff;border:1px solid #e8edf6;border-radius:18px;padding:20px;box-shadow:0 12px 30px #172c6110}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.metric b{font-size:30px}.metric p{margin:8px 0 0;color:#68758a}.accent{color:#315fe9}.toolbar{display:flex;gap:10px;margin:16px 0}.btn{background:#315fe9;color:#fff;border:0;border-radius:9px;padding:10px 14px;cursor:pointer}.btn.alt{background:#eff3ff;color:#315fe9}.btn.danger{background:#fff0f0;color:#d93442}input,select{border:1px solid #dfe5f0;border-radius:9px;padding:10px;width:100%}table{width:100%;border-collapse:collapse}th{text-align:left;color:#728096;font-size:13px}td,th{padding:13px 9px;border-bottom:1px solid #eef1f6}.pill{padding:5px 9px;border-radius:99px;font-size:12px;background:#e9f9ef;color:#178342}.pill.warn{background:#fff2e7;color:#c66a19}.flash{padding:12px 15px;border-radius:10px;margin-bottom:15px;background:#e9f9ef;color:#178342}.modal{display:grid;grid-template-columns:1.2fr 1fr;gap:18px}.insight{line-height:1.8;background:#f2f6ff;border-left:4px solid #315fe9;padding:16px;border-radius:8px}@media(max-width:900px){.side{position:static;width:auto}.main{margin:0;padding:20px}.grid{grid-template-columns:repeat(2,1fr)}}
</style></head><body><aside class="side"><div class="brand">智阅<span>馆</span></div><a href="/">◈ 数据驾驶舱</a><a href="/books">▦ 图书资产</a><a href="/readers">◎ 读者中心</a><a href="/loans">↔ 借还流转</a><a href="/ai-insights">✦ AI 洞察</a><a href="/admins">♙ 管理员账号</a><hr style="border-color:#ffffff22;margin:24px 0"><small>MySQL · Flask · AI</small></aside><main class="main"><div class="top"><div><div class="eyebrow">SMART LIBRARY MANAGEMENT</div><h2 style="margin:5px 0">{% block heading %}运营概览{% endblock %}</h2></div><div><a class="btn alt" href="/export/books">导出图书</a> <a class="btn alt" href="/export/readers">导出读者</a> <a class="btn alt" href="/export/loans">导出借阅</a> <a class="btn" href="/logout">退出</a></div></div>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="flash">{{m}}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main></body></html>
