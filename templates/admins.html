{% extends 'base.html' %}{% block heading %}管理员账号{% endblock %}{% block content %}<div class="modal"><div class="card"><table><tr><th>用户名</th><th>创建日期</th><th></th></tr>{% for a in admins %}<tr><td><b>{{a.username}}</b></td><td>{{a.created_at}}</td><td><form method="post" action="/admins/{{a.id}}/delete"><button class="btn danger">删除</button></form></td></tr>{% endfor %}</table></div><div class="card"><h3>新增管理员</h3><form method="post"><p><input name="username" placeholder="用户名（不可重名）" required></p><p><input name="password" type="password" placeholder="密码（至少 6 位）" required></p><button class="btn">创建账号</button></form></div></div>{% endblock %}
