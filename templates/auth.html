<!doctype html><html lang="zh-CN"><meta charset="utf-8"><title>智阅馆 · 登录</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 15% 20%,#597ef7,#121a3a 65%);font-family:"Microsoft YaHei"}.box{width:760px;max-width:90%;display:grid;grid-template-columns:1fr 1fr;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 30px 80px #0005}.hero{padding:55px 42px;background:linear-gradient(145deg,#1d2f75,#335dce);color:#fff}.form{padding:42px}input{width:100%;box-sizing:border-box;padding:12px;margin:7px 0 16px;border:1px solid #d8dfee;border-radius:9px}.btn{border:0;padding:12px 18px;border-radius:9px;background:#315fe9;color:#fff;width:100%;cursor:pointer}.error{color:#c22;margin:8px 0}</style><div class="box"><section class="hero"><h1>智阅馆</h1><p>一个为校园图书馆设计的 MySQL 数据管理系统。</p><p>管理图书、读者、借还、数据洞察与运营导出。</p></section><section class="form"><h2>管理员入口</h2>{% with messages=get_flashed_messages() %}{% for m in messages %}<p class="error">{{m}}</p>{% endfor %}{% endwith %}<form method="post"><input type="hidden" name="action" value="login"><input name="username" placeholder="用户名" required><input name="password" type="password" placeholder="密码" required><button class="btn">登录系统</button></form><hr><h3>首次使用？注册账号</h3><form method="post"><input type="hidden" name="action" value="register"><input name="username" placeholder="新用户名" required><input name="password" type="password" placeholder="至少 6 位密码" required><button class="btn">注册并进入</button></form></section></div>
