{% extends 'base.html' %}{% block content %}<div class="grid">{% for k,v,label in [('books',stats.books,'馆藏图书'),('readers',stats.readers,'注册读者'),('active',stats.active,'借阅中'),('overdue',stats.overdue,'逾期预警')] %}<div class="card metric"><b class="accent">{{v}}</b><p>{{label}}</p></div>{% endfor %}</div><div class="card" style="margin-top:20px"><h3>热门图书排行</h3><canvas id="chart"></canvas></div><script>new Chart(document.querySelector('#chart'),{type:'bar',data:{labels:{{popular|map(attribute=0)|list|tojson}},datasets:[{label:'借阅次数',data:{{popular|map(attribute=1)|list|tojson}},backgroundColor:'#315fe9',borderRadius:8}]}})</script>{% endblock %}
