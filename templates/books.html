{% extends 'base.html' %}{% block heading %}图书资产{% endblock %}{% block content %}<div class="modal"><div class="card"><form method="get" class="toolbar"><input name="q" value="{{q}}" placeholder="按书名或作者搜索"><button class="btn">搜索</button></form><table><tr><th>图书</th><th>分类</th><th>库存</th><th></th></tr>{% for b in books %}<tr><td><b>{{b.title}}</b><br><small>{{b.author}} · {{b.isbn or '无 ISBN'}}</small></td><td>{{b.category.name}}</td><td>{{b.available_qty}} / {{b.total_qty}}</td><td><form method="post" action="/books/{{b.id}}/delete"><button class="btn danger">删除</button></form></td></tr>{% endfor %}</table></div><div class="card"><h3>新增图书</h3><form method="post"><p><input name="title" placeholder="书名" required></p><p><input name="author" placeholder="作者" required></p><p><input name="isbn" placeholder="ISBN（可选）"></p><p><select name="category_id">{% for c in categories %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select></p><p><input name="qty" type="number" min="1" value="1"></p><button class="btn">保存入库</button></form></div></div>{% endblock %}
