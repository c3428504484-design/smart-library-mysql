<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}智阅馆{% endblock %}</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,"Microsoft YaHei",sans-serif;background:#f6f8fc;color:#182230}.side{position:fixed;width:240px;inset:0 auto 0 0;background:linear-gradient(170deg,#111c3b,#263b85);color:#dbe6ff;padding:28px 16px}.brand{font-size:22px;font-weight:800;color:#fff;margin:0 12px 34px}.brand span{color:#74d5ff}.side a{display:block;color:#c4d1f4;text-decoration:none;padding:12px;border-radius:10px;margin:6px 0}.side a:hover{background:#ffffff20;color:#fff}.main{margin-left:240px;padding:34px 48px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.eyebrow{color:#637083;font-size:13px}.card{background:#fff;border:1px solid #e8edf6;border-radius:18px;padding:20px;box-shadow:0 12px 30px #172c6110}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.metric b{font-size:30px}.metric p{margin:8px 0 0;color:#68758a}.accent{color:#315fe9}.toolbar{display:flex;gap:10px;margin:16px 0}.btn{background:#315fe9;color:#fff;border:0;border-radius:9px;padding:10px 14px;cursor:pointer}.btn.alt{background:#eff3ff;color:#315fe9}.btn.danger{background:#fff0f0;color:#d93442}input,select{border:1px solid #dfe5f0;border-radius:9px;padding:10px;width:100%}table{width:100%;border-collapse:collapse}th{text-align:left;color:#728096;font-size:13px}td,th{padding:13px 9px;border-bottom:1px solid #eef1f6}.pill{padding:5px 9px;border-radius:99px;font-size:12px;background:#e9f9ef;color:#178342}.pill.warn{background:#fff2e7;color:#c66a19}.flash{padding:12px 15px;border-radius:10px;margin-bottom:15px;background:#e9f9ef;color:#178342}.modal{display:grid;grid-template-columns:1.2fr 1fr;gap:18px}.insight{line-height:1.8;background:#f2f6ff;border-left:4px solid #315fe9;padding:16px;border-radius:8px}.api-key-form{margin:16px 0;padding:14px;background:#f7f9fe;border:1px solid #e7ecf8;border-radius:12px}.api-key-form label{display:block;font-size:13px;font-weight:700;margin-bottom:8px}.api-key-form>div{display:flex;gap:10px}.api-key-form small{display:block;color:#78869a;margin-top:8px;font-size:12px}
.cockpit-hero{background:linear-gradient(120deg,#182c66,#315fe9 60%,#47bfe7);border-radius:20px;padding:26px 30px;color:#fff;display:flex;justify-content:space-between;align-items:center;overflow:hidden;position:relative}.cockpit-hero:after{content:'';position:absolute;width:260px;height:260px;border:40px solid #fff2;border-radius:50%;right:15%;top:-160px}.hero-eyebrow{color:#c9d8ff}.cockpit-hero h3{font-size:25px;margin:8px 0}.cockpit-hero p{margin:0;color:#e1eaff}.hero-rate{z-index:1;min-width:165px;text-align:right}.hero-rate span,.hero-rate small{display:block;color:#dbe7ff;font-size:12px}.hero-rate strong{display:block;font-size:38px;margin:4px 0}.metric-grid{margin-top:18px}.metric{position:relative;overflow:hidden}.metric b{display:block}.metric small{display:block;color:#8a96a8;margin-top:8px}.metric-dot{width:10px;height:10px;border-radius:50%;display:block;margin-bottom:13px;background:#315fe9;box-shadow:0 0 0 6px #315fe91b}.metric-purple .metric-dot{background:#7c5cff;box-shadow:0 0 0 6px #7c5cff18}.metric-cyan .metric-dot{background:#23b7d9;box-shadow:0 0 0 6px #23b7d918}.metric-orange .metric-dot{background:#ff9f43;box-shadow:0 0 0 6px #ff9f431b}.chart-layout{display:grid;grid-template-columns:1.35fr .85fr;gap:18px}.dashboard-space{margin-top:20px}.lower-layout{grid-template-columns:.8fr .8fr 1.4fr;margin-top:18px}.chart-card{min-height:305px}.chart-card canvas{height:225px!important}.chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}.chart-head h3{margin:0 0 5px;font-size:16px}.chart-head p{margin:0;color:#8591a3;font-size:12px}.tag{font-size:11px;color:#315fe9;background:#edf2ff;padding:6px 8px;border-radius:99px}.ranking-card{padding:21px 22px}.rank-row{display:grid;grid-template-columns:28px 1fr 30px;gap:10px;align-items:center;margin:13px 0}.rank-number{width:23px;height:23px;display:grid;place-items:center;border-radius:7px;background:#eef2ff;color:#315fe9;font-weight:800;font-size:12px}.rank-row strong{font-size:13px;font-weight:600}.rank-row>b{font-size:13px;color:#315fe9}.rank-bar{height:5px;background:#edf0f6;border-radius:5px;margin-top:7px;overflow:hidden}.rank-bar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#315fe9,#76b7ff)}.empty{color:#8591a3}@media(max-width:1100px){.chart-layout,.lower-layout{grid-template-columns:1fr 1fr}.ranking-card{grid-column:span 2}}@media(max-width:900px){.side{position:static;width:auto}.main{margin:0;padding:20px}.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){.cockpit-hero{display:block}.hero-rate{text-align:left;margin-top:18px}.chart-layout,.lower-layout{grid-template-columns:1fr}.ranking-card{grid-column:auto}.chart-card{min-height:280px}}
</style></head><body><aside class="side"><div class="brand">智阅<span>馆</span></div><a href="/">◈ 数据驾驶舱</a><a href="/books">▦ 图书资产</a><a href="/readers">◎ 读者中心</a><a href="/loans">↔ 借还流转</a><a href="/ai-insights">✦ AI 洞察</a><a href="/admins">♙ 管理员账号</a><hr style="border-color:#ffffff22;margin:24px 0"><small>MySQL · Flask · AI</small></aside><main class="main"><div class="top"><div><div class="eyebrow">SMART LIBRARY MANAGEMENT</div><h2 style="margin:5px 0">{% block heading %}运营概览{% endblock %}</h2></div><div><a class="btn alt" href="/export/books">导出图书</a> <a class="btn alt" href="/export/readers">导出读者</a> <a class="btn alt" href="/export/loans">导出借阅</a> <a class="btn" href="/logout">退出</a></div></div>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="flash">{{m}}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main></body></html>
